name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - name: Generate llms.txt per set
        run: |
          python3 - << 'PYEOF'
          import os, glob, re

          LLMS_DIR = "src/llms"
          BASE_URL = "https://uips-fixtures.github.io/llms"

          if not os.path.isdir(LLMS_DIR):
              print("No llms/ directory found, skipping.")
              exit()

          def parse_header(path, pkg_id):
              """Extract version, activity count and authors from file header.
              H1 format: # {pkg_id} {version}
              Blockquote lines: > activities: N  /  > authors: ...
              """
              version = acts = authors = ""
              with open(path, encoding="utf-8") as f:
                  for line in f:
                      line = line.rstrip()
                      if not line and acts:
                          break
                      m = re.match(r"^#\s+" + re.escape(pkg_id) + r"\s+(.+)", line)
                      if m: version = m.group(1).strip()
                      m = re.match(r"^> activities:\s*(\d+)", line)
                      if m: acts = m.group(1)
                      m = re.match(r"^> authors:\s*(.+)", line)
                      if m: authors = m.group(1).strip()
              return version, acts, authors

          for set_dir in sorted(os.scandir(LLMS_DIR), key=lambda e: e.name):
              if not set_dir.is_dir():
                  continue
              set_id = set_dir.name
              pkg_files = sorted(
                  f for f in glob.glob(os.path.join(set_dir.path, "*.txt"))
                  if os.path.basename(f) != "llms.txt"
              )
              if not pkg_files:
                  continue

              lines = [
                  f"# {set_id} — Workflow Activity Reference",
                  "",
                  f"> Curated set of per-package LLM reference files.",
                  f"> Each file lists all activities, arguments, and properties for one package.",
                  "",
                  "## Packages",
                  "",
              ]
              for path in pkg_files:
                  pkg_id  = os.path.splitext(os.path.basename(path))[0]
                  ver, acts, auth = parse_header(path, pkg_id)
                  url  = f"{BASE_URL}/{set_id}/{pkg_id}.txt"
                  desc = ""
                  if ver:   desc += f" {ver}"
                  if acts:  desc += f", {acts} activities"
                  if auth:  desc += f" ({auth})"
                  lines.append(f"- [{pkg_id}]({url}):{desc}")

              lines.append("")
              out = os.path.join(set_dir.path, "llms.txt")
              with open(out, "w", encoding="utf-8", newline="\n") as f:
                  f.write("\n".join(lines))
              print(f"  {set_id}/llms.txt: {len(pkg_files)} packages")
          PYEOF

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
